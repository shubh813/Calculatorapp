# ── Application Info ─────────────────────────────────────────────
app.name=Calculator App
app.version=1.0.0

# ── Server ───────────────────────────────────────────────────────
server.port=8080
spring.application.name=calculator-app

# ── Build Timestamp ──────────────────────────────────────────────
# Maven build ke time yeh automatically fill ho jaata hai
build.timestamp=${maven.build.timestamp}

# ── Git Properties Import ─────────────────────────────────────────
# git-commit-id-plugin ek git.properties file banata hai
# Spring Boot usse yahan se import karta hai
# "optional:" matlab - file nahi mili toh error mat do
spring.config.import=optional:classpath:git.properties

# ── JSON formatting ───────────────────────────────────────────────
spring.jackson.serialization.indent-output=true
